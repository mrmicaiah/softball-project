<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Showdown — Softball Facts by Kensey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #B8E0F2;
  --sky-deep: #7CC2E0;
  --sky-dark: #2E7DA8;
  --pink: #FF8FB8;
  --pink-deep: #E85B91;
  --cream: #FFFBF2;
  --ink: #1B2A3A;
  --girls: #E85B91;
  --guys: #2E7DA8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Fraunces', Georgia, serif;
  background: var(--cream);
  color: var(--ink);
  line-height: 1.4;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(184, 224, 242, 0.4) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(255, 143, 184, 0.25) 0%, transparent 45%);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(27, 42, 58, 0.07) 1px, transparent 1px);
  background-size: 16px 16px;
  pointer-events: none;
  z-index: 0;
}

main {
  position: relative;
  z-index: 1;
  max-width: 1200px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
  gap: 15px;
}

.back-link {
  font-family: 'Caveat', cursive;
  font-size: 1.4rem;
  color: var(--ink);
  text-decoration: none;
  background: white;
  padding: 6px 18px;
  border: 3px solid var(--ink);
  border-radius: 30px;
  box-shadow: 3px 3px 0 var(--ink);
  transition: transform 0.15s ease;
}
.back-link:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }

h1 {
  font-family: 'Bungee', sans-serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: var(--sky-dark);
  text-shadow: 3px 3px 0 var(--pink);
  text-align: center;
  flex: 1;
}

.round-indicator {
  font-family: 'Bungee', sans-serif;
  background: var(--ink);
  color: var(--cream);
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 1rem;
}

.scoreboard {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 30px;
}

.team {
  background: white;
  border: 4px solid var(--ink);
  border-radius: 18px;
  padding: 18px;
  text-align: center;
  position: relative;
  box-shadow: 6px 6px 0 var(--ink);
  transition: all 0.2s ease;
}

.team.girls { background: linear-gradient(135deg, #FFD6E5 0%, #FF8FB8 100%); }
.team.guys { background: linear-gradient(135deg, #C8E5F2 0%, #7CC2E0 100%); }

.team.active {
  transform: translate(-2px, -2px) scale(1.02);
  box-shadow: 10px 10px 0 var(--ink);
}

.team.active::after {
  content: '◀ YOUR TURN';
  position: absolute;
  top: -14px;
  right: 12px;
  background: var(--ink);
  color: var(--cream);
  font-family: 'Bungee', sans-serif;
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 1px;
}

.team-name {
  font-family: 'Bungee', sans-serif;
  font-size: 1.4rem;
  color: var(--ink);
  margin-bottom: 4px;
}

.team-score {
  font-family: 'Bungee', sans-serif;
  font-size: 3rem;
  color: var(--ink);
  line-height: 1;
}

.team-label {
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  color: var(--ink);
}

.clue-card {
  background: var(--cream);
  border: 4px solid var(--ink);
  border-radius: 16px;
  padding: 18px 24px;
  margin-bottom: 24px;
  box-shadow: 5px 5px 0 var(--ink);
  text-align: center;
  position: relative;
}

.clue-label {
  font-family: 'Caveat', cursive;
  color: var(--pink-deep);
  font-size: 1.3rem;
  display: block;
  margin-bottom: 4px;
}

.clue-text {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: clamp(1.1rem, 2.5vw, 1.4rem);
  font-weight: 700;
}

.puzzle-board {
  background: var(--sky-dark);
  border: 5px solid var(--ink);
  border-radius: 16px;
  padding: 24px 18px;
  margin-bottom: 24px;
  box-shadow: 8px 8px 0 var(--ink);
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 18px;
}

.puzzle-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}

.tile {
  width: clamp(32px, 7vw, 52px);
  height: clamp(44px, 9vw, 68px);
  background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
  border: 3px solid var(--ink);
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Bungee', sans-serif;
  font-size: clamp(1.2rem, 3.5vw, 2rem);
  color: var(--ink);
  position: relative;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  transition: transform 0.4s ease, background 0.4s ease;
}

.tile.empty {
  background: linear-gradient(180deg, #5a9bbf 0%, #3d7a99 100%);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
}

.tile.space {
  background: transparent;
  border: none;
  box-shadow: none;
  width: clamp(12px, 2vw, 18px);
}

.tile.revealed {
  animation: flip 0.6s ease;
}

@keyframes flip {
  0% { transform: rotateY(0deg); background: var(--pink); }
  50% { transform: rotateY(90deg) scale(1.1); }
  100% { transform: rotateY(0deg); }
}

.keyboard {
  background: white;
  border: 4px solid var(--ink);
  border-radius: 16px;
  padding: 18px;
  box-shadow: 6px 6px 0 var(--ink);
  margin-bottom: 24px;
}

.keyboard-label {
  font-family: 'Caveat', cursive;
  font-size: 1.3rem;
  color: var(--pink-deep);
  text-align: center;
  display: block;
  margin-bottom: 12px;
}

.keys {
  display: grid;
  grid-template-columns: repeat(13, 1fr);
  gap: 6px;
}

.key {
  aspect-ratio: 1;
  border: 2px solid var(--ink);
  border-radius: 6px;
  background: var(--cream);
  font-family: 'Bungee', sans-serif;
  font-size: clamp(0.85rem, 2vw, 1.2rem);
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s ease;
  box-shadow: 2px 2px 0 var(--ink);
}

.key:hover:not(:disabled) {
  background: var(--pink);
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 var(--ink);
}

.key:active:not(:disabled) {
  transform: translate(1px, 1px);
  box-shadow: 1px 1px 0 var(--ink);
}

.key:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  box-shadow: none;
  background: #ddd;
}

.key.correct {
  background: var(--sky-deep);
  color: white;
}

.key.wrong {
  background: #ddd;
  color: #999;
  text-decoration: line-through;
}

@media (max-width: 600px) {
  .keys { grid-template-columns: repeat(7, 1fr); }
}

.actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.btn {
  font-family: 'Bungee', sans-serif;
  font-size: 1rem;
  padding: 12px 24px;
  border: 3px solid var(--ink);
  border-radius: 30px;
  cursor: pointer;
  background: var(--cream);
  color: var(--ink);
  box-shadow: 4px 4px 0 var(--ink);
  transition: all 0.15s ease;
  text-decoration: none;
  display: inline-block;
}

.btn:hover {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0 var(--ink);
}

.btn:active {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0 var(--ink);
}

.btn.solve { background: var(--pink); color: white; }
.btn.pass { background: white; }

.message {
  text-align: center;
  font-family: 'Caveat', cursive;
  font-size: 1.5rem;
  min-height: 36px;
  color: var(--ink);
  margin-bottom: 10px;
  transition: opacity 0.3s ease;
}

.message.bad { color: var(--pink-deep); font-weight: 700; }
.message.good { color: var(--sky-dark); font-weight: 700; }

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(27, 42, 58, 0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal-backdrop.show { display: flex; }

.modal {
  background: var(--cream);
  border: 5px solid var(--ink);
  border-radius: 20px;
  padding: 30px;
  max-width: 500px;
  width: 100%;
  box-shadow: 10px 10px 0 var(--ink);
  text-align: center;
}

.modal h2 {
  font-family: 'Bungee', sans-serif;
  font-size: 2rem;
  color: var(--sky-dark);
  margin-bottom: 16px;
  text-shadow: 3px 3px 0 var(--pink);
}

.modal p { font-size: 1.1rem; margin-bottom: 16px; }

.modal input {
  width: 100%;
  padding: 12px 16px;
  font-family: 'Bungee', sans-serif;
  font-size: 1.5rem;
  border: 3px solid var(--ink);
  border-radius: 8px;
  text-align: center;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 16px;
  background: white;
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.winner-screen {
  text-align: center;
  padding: 40px 20px;
}

.winner-trophy {
  font-size: 6rem;
  margin: 20px 0;
  display: inline-block;
  animation: trophy-bounce 1s ease infinite;
}

@keyframes trophy-bounce {
  0%, 100% { transform: rotate(-5deg) scale(1); }
  50% { transform: rotate(5deg) scale(1.1); }
}

.winner-text {
  font-family: 'Bungee', sans-serif;
  font-size: clamp(2rem, 7vw, 4rem);
  margin-bottom: 16px;
  text-shadow: 4px 4px 0 var(--ink);
}

.winner-text.girls { color: var(--girls); }
.winner-text.guys { color: var(--guys); }
.winner-text.tie { color: var(--ink); }

.final-scores {
  font-family: 'Bungee', sans-serif;
  font-size: 1.4rem;
  margin: 20px 0;
}

</style>
</head>
<body>
<main>

<div class="topbar">
  <a href="index.html" class="back-link">← back</a>
  <h1>Quiz Showdown</h1>
  <div class="round-indicator">ROUND <span id="round-num">1</span>/5</div>
</div>

<div class="scoreboard">
  <div class="team girls" id="team-girls">
    <div class="team-name">GIRLS</div>
    <div class="team-score" id="score-girls">0</div>
    <div class="team-label">~ go girls! ~</div>
  </div>
  <div class="team guys" id="team-guys">
    <div class="team-name">GUYS</div>
    <div class="team-score" id="score-guys">0</div>
    <div class="team-label">~ go guys! ~</div>
  </div>
</div>

<div class="clue-card">
  <span class="clue-label">~ your clue ~</span>
  <div class="clue-text" id="clue-text">Loading...</div>
</div>

<div class="puzzle-board" id="puzzle-board"></div>

<div class="message" id="message">Pick a letter to start the round!</div>

<div class="keyboard">
  <span class="keyboard-label">~ pick a letter ~</span>
  <div class="keys" id="keys"></div>
</div>

<div class="actions">
  <button class="btn solve" id="btn-solve">SOLVE PUZZLE</button>
  <button class="btn pass" id="btn-pass">PASS TURN</button>
</div>

</main>

<div class="modal-backdrop" id="solve-modal">
  <div class="modal">
    <h2>Solve It!</h2>
    <p>Type your guess. If you're right, you win the round + extra points!</p>
    <input type="text" id="solve-input" placeholder="YOUR ANSWER" maxlength="40" autocomplete="off">
    <div class="modal-actions">
      <button class="btn solve" id="solve-submit">SUBMIT</button>
      <button class="btn pass" id="solve-cancel">CANCEL</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="winner-modal">
  <div class="modal winner-screen">
    <div class="winner-trophy">🏆</div>
    <div class="winner-text" id="winner-text">WINNER!</div>
    <div class="final-scores">
      Girls: <span id="final-girls">0</span> ★ Guys: <span id="final-guys">0</span>
    </div>
    <p id="winner-blurb">Great game!</p>
    <div class="modal-actions">
      <button class="btn solve" onclick="location.reload()">PLAY AGAIN</button>
      <a href="index.html" class="btn pass">HOME</a>
    </div>
  </div>
</div>

<script>
const PUZZLES = [
  {
    answer: "KITTEN BALL",
    clue: "What was softball ORIGINALLY called when it was invented in 1887?"
  },
  {
    answer: "CHICAGO",
    clue: "A boxing glove + a broomstick = the very first softball game. What city was it played in?"
  },
  {
    answer: "HARDER",
    clue: "Even though it's called \"softball,\" the ball is actually THIS compared to a baseball."
  },
  {
    answer: "WINDMILL",
    clue: "This pitching style — where the arm whips around in a full circle — is unique to fastpitch softball."
  },
  {
    answer: "REACTION TIME",
    clue: "Because the pitcher's mound is so much closer, batters in softball have less of THIS than MLB batters facing a 100mph fastball."
  }
];

let state = {
  round: 0,
  currentTeam: 'girls',
  scores: { girls: 0, guys: 0 },
  guessedLetters: new Set(),
  revealed: new Set(),
};

const $ = (id) => document.getElementById(id);
const board = $('puzzle-board');
const keys = $('keys');
const message = $('message');

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
ALPHABET.split('').forEach(letter => {
  const btn = document.createElement('button');
  btn.className = 'key';
  btn.textContent = letter;
  btn.dataset.letter = letter;
  btn.onclick = () => guessLetter(letter);
  keys.appendChild(btn);
});

function startRound() {
  if (state.round >= PUZZLES.length) {
    endGame();
    return;
  }

  const puzzle = PUZZLES[state.round];
  state.guessedLetters = new Set();
  state.revealed = new Set();

  $('round-num').textContent = state.round + 1;
  $('clue-text').textContent = puzzle.clue;

  document.querySelectorAll('.key').forEach(k => {
    k.disabled = false;
    k.classList.remove('correct', 'wrong');
  });

  board.innerHTML = '';
  const words = puzzle.answer.split(' ');
  words.forEach((word, wordIdx) => {
    const row = document.createElement('div');
    row.className = 'puzzle-row';
    word.split('').forEach((char, charIdx) => {
      const tile = document.createElement('div');
      tile.className = 'tile empty';
      tile.dataset.letter = char;
      tile.dataset.position = `${wordIdx}-${charIdx}`;
      row.appendChild(tile);
    });
    board.appendChild(row);
  });

  setMessage(`Round ${state.round + 1}: ${state.currentTeam.toUpperCase()} go first!`, 'good');
  updateActiveTeam();
}

function setMessage(text, type = '') {
  message.textContent = text;
  message.className = 'message ' + type;
}

function updateActiveTeam() {
  $('team-girls').classList.toggle('active', state.currentTeam === 'girls');
  $('team-guys').classList.toggle('active', state.currentTeam === 'guys');
}

function switchTeam() {
  state.currentTeam = state.currentTeam === 'girls' ? 'guys' : 'girls';
  updateActiveTeam();
}

function guessLetter(letter) {
  if (state.guessedLetters.has(letter)) return;
  state.guessedLetters.add(letter);

  const puzzle = PUZZLES[state.round];
  const keyEl = document.querySelector(`.key[data-letter="${letter}"]`);
  keyEl.disabled = true;

  if (puzzle.answer.includes(letter)) {
    keyEl.classList.add('correct');
    let count = 0;
    document.querySelectorAll(`.tile[data-letter="${letter}"]`).forEach((tile, i) => {
      setTimeout(() => {
        tile.classList.remove('empty');
        tile.classList.add('revealed');
        tile.textContent = letter;
      }, i * 150);
      count++;
    });
    state.scores[state.currentTeam] += count * 10;
    updateScores();
    setMessage(`✓ ${count} ${letter}${count > 1 ? "'s" : ''}! +${count * 10} points. Pick another letter or SOLVE!`, 'good');

    setTimeout(() => {
      if (isPuzzleSolved()) {
        setMessage(`🎉 ${state.currentTeam.toUpperCase()} solved it letter-by-letter! +50 bonus!`, 'good');
        state.scores[state.currentTeam] += 50;
        updateScores();
        setTimeout(nextRound, 2200);
      }
    }, count * 150 + 100);

  } else {
    keyEl.classList.add('wrong');
    setMessage(`✗ No "${letter}". ${otherTeam().toUpperCase()}, your turn!`, 'bad');
    switchTeam();
  }
}

function otherTeam() {
  return state.currentTeam === 'girls' ? 'guys' : 'girls';
}

function isPuzzleSolved() {
  return [...document.querySelectorAll('.tile')].every(t => !t.classList.contains('empty'));
}

function updateScores() {
  $('score-girls').textContent = state.scores.girls;
  $('score-guys').textContent = state.scores.guys;
}

function nextRound() {
  state.round++;
  state.currentTeam = state.round % 2 === 0 ? 'girls' : 'guys';
  startRound();
}

$('btn-solve').onclick = () => {
  $('solve-modal').classList.add('show');
  $('solve-input').value = '';
  $('solve-input').focus();
};

$('solve-cancel').onclick = () => {
  $('solve-modal').classList.remove('show');
};

$('solve-submit').onclick = checkSolve;

$('solve-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') checkSolve();
});

function checkSolve() {
  const guess = $('solve-input').value.trim().toUpperCase();
  const answer = PUZZLES[state.round].answer;
  $('solve-modal').classList.remove('show');

  if (guess === answer) {
    state.scores[state.currentTeam] += 100;
    updateScores();
    document.querySelectorAll('.tile.empty').forEach((tile, i) => {
      setTimeout(() => {
        tile.classList.remove('empty');
        tile.classList.add('revealed');
        tile.textContent = tile.dataset.letter;
      }, i * 80);
    });
    setMessage(`🎉 ${state.currentTeam.toUpperCase()} SOLVED IT! +100 points!`, 'good');
    setTimeout(nextRound, 2500);
  } else {
    setMessage(`✗ "${guess}" is wrong. ${otherTeam().toUpperCase()}, your turn!`, 'bad');
    switchTeam();
  }
}

$('btn-pass').onclick = () => {
  setMessage(`${state.currentTeam.toUpperCase()} passed. ${otherTeam().toUpperCase()}, you're up!`, '');
  switchTeam();
};

function endGame() {
  $('final-girls').textContent = state.scores.girls;
  $('final-guys').textContent = state.scores.guys;

  let winnerText, winnerClass, blurb;
  if (state.scores.girls > state.scores.guys) {
    winnerText = 'GIRLS WIN! 💖';
    winnerClass = 'girls';
    blurb = 'Girls dominated the diamond!';
  } else if (state.scores.guys > state.scores.girls) {
    winnerText = 'GUYS WIN! ⚾';
    winnerClass = 'guys';
    blurb = 'Guys took home the trophy!';
  } else {
    winnerText = "IT'S A TIE!";
    winnerClass = 'tie';
    blurb = 'Wow — perfectly even! Rematch?';
  }

  const w = $('winner-text');
  w.textContent = winnerText;
  w.className = 'winner-text ' + winnerClass;
  $('winner-blurb').textContent = blurb;
  $('winner-modal').classList.add('show');
}

startRound();

</script>
</body>
</html>
