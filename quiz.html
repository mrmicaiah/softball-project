<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeopardy Showdown — Softball Facts by Kensey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #B8E0F2;
  --sky-deep: #7CC2E0;
  --sky-dark: #2E7DA8;
  --pink: #FF8FB8;
  --pink-deep: #E85B91;
  --cream: #FFFBF2;
  --ink: #1B2A3A;
  --girls: #E85B91;
  --guys: #2E7DA8;
  --jeopardy-blue: #060CE9;
  --gold: #FFCC00;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Fraunces', Georgia, serif;
  background: var(--cream);
  color: var(--ink);
  line-height: 1.4;
  min-height: 100vh;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(184, 224, 242, 0.4) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(255, 143, 184, 0.25) 0%, transparent 45%);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(27, 42, 58, 0.07) 1px, transparent 1px);
  background-size: 16px 16px;
  pointer-events: none;
  z-index: 0;
}

main {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 30px;
  flex-wrap: wrap;
  gap: 15px;
}

.back-link {
  font-family: 'Caveat', cursive;
  font-size: 1.4rem;
  color: var(--ink);
  text-decoration: none;
  background: white;
  padding: 6px 18px;
  border: 3px solid var(--ink);
  border-radius: 30px;
  box-shadow: 3px 3px 0 var(--ink);
  transition: transform 0.15s ease;
}
.back-link:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0 var(--ink); }

h1 {
  font-family: 'Bungee', sans-serif;
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: var(--sky-dark);
  text-shadow: 3px 3px 0 var(--pink);
  text-align: center;
  flex: 1;
}

.scoreboard {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.team {
  background: white;
  border: 4px solid var(--ink);
  border-radius: 18px;
  padding: 18px;
  text-align: center;
  position: relative;
  box-shadow: 6px 6px 0 var(--ink);
  transition: all 0.2s ease;
}

.team.girls { background: linear-gradient(135deg, #FFD6E5 0%, #FF8FB8 100%); }
.team.guys { background: linear-gradient(135deg, #C8E5F2 0%, #7CC2E0 100%); }

.team.active {
  transform: translate(-2px, -2px) scale(1.02);
  box-shadow: 10px 10px 0 var(--ink);
}

.team.active::after {
  content: '◀ YOUR TURN';
  position: absolute;
  top: -14px;
  right: 12px;
  background: var(--ink);
  color: var(--cream);
  font-family: 'Bungee', sans-serif;
  font-size: 0.75rem;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 1px;
}

.team-name {
  font-family: 'Bungee', sans-serif;
  font-size: 1.4rem;
  color: var(--ink);
  margin-bottom: 4px;
}

.team-score {
  font-family: 'Bungee', sans-serif;
  font-size: 2.5rem;
  color: var(--ink);
  line-height: 1;
}

.team-label {
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  color: var(--ink);
}

.category-header {
  background: var(--jeopardy-blue);
  border: 5px solid var(--ink);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 16px;
  text-align: center;
  box-shadow: 6px 6px 0 var(--ink);
}

.category-header h2 {
  font-family: 'Bungee', sans-serif;
  color: var(--gold);
  font-size: clamp(1.2rem, 3.5vw, 1.8rem);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
  letter-spacing: 2px;
}

.message {
  text-align: center;
  font-family: 'Caveat', cursive;
  font-size: 1.6rem;
  min-height: 40px;
  color: var(--ink);
  margin-bottom: 16px;
  padding: 0 10px;
}

.message.bad { color: var(--pink-deep); font-weight: 700; }
.message.good { color: var(--sky-dark); font-weight: 700; }

.board {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-bottom: 30px;
}

.board-tile {
  background: var(--jeopardy-blue);
  color: var(--gold);
  border: 5px solid var(--ink);
  border-radius: 12px;
  padding: 24px;
  font-family: 'Bungee', sans-serif;
  font-size: clamp(2rem, 6vw, 3rem);
  text-align: center;
  cursor: pointer;
  box-shadow: 5px 5px 0 var(--ink);
  transition: all 0.15s ease;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
  letter-spacing: 1px;
}

.board-tile:hover:not(.done) {
  transform: translate(-3px, -3px);
  box-shadow: 8px 8px 0 var(--ink);
  background: #0820ff;
}

.board-tile:active:not(.done) {
  transform: translate(2px, 2px);
  box-shadow: 2px 2px 0 var(--ink);
}

.board-tile.done {
  background: #ddd;
  color: #999;
  cursor: not-allowed;
  text-shadow: none;
  box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
}

.board-tile.done::after {
  content: ' ✓';
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(27, 42, 58, 0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}

.modal-backdrop.show { display: flex; }

.modal {
  background: var(--cream);
  border: 5px solid var(--ink);
  border-radius: 20px;
  padding: 28px;
  max-width: 560px;
  width: 100%;
  box-shadow: 10px 10px 0 var(--ink);
  text-align: center;
}

.modal-value {
  display: inline-block;
  background: var(--gold);
  color: var(--jeopardy-blue);
  font-family: 'Bungee', sans-serif;
  font-size: 1.8rem;
  padding: 6px 24px;
  border: 3px solid var(--ink);
  border-radius: 30px;
  margin-bottom: 16px;
  box-shadow: 3px 3px 0 var(--ink);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
}

.modal-team-banner {
  font-family: 'Caveat', cursive;
  font-size: 1.4rem;
  margin-bottom: 10px;
  color: var(--ink);
}

.modal-team-banner strong {
  font-family: 'Bungee', sans-serif;
  font-size: 1.2rem;
}

.modal-team-banner.girls strong { color: var(--girls); }
.modal-team-banner.guys strong { color: var(--guys); }

.modal-clue {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 700;
  font-size: clamp(1.2rem, 3vw, 1.5rem);
  margin: 16px 0 20px;
  padding: 16px;
  background: white;
  border: 3px solid var(--ink);
  border-radius: 12px;
  line-height: 1.4;
}

.modal-input {
  width: 100%;
  padding: 14px 16px;
  font-family: 'Bungee', sans-serif;
  font-size: 1.4rem;
  border: 3px solid var(--ink);
  border-radius: 10px;
  text-align: center;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
  background: white;
}

.modal-input:focus {
  outline: none;
  box-shadow: 0 0 0 3px var(--pink);
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  font-family: 'Bungee', sans-serif;
  font-size: 1rem;
  padding: 12px 24px;
  border: 3px solid var(--ink);
  border-radius: 30px;
  cursor: pointer;
  background: var(--cream);
  color: var(--ink);
  box-shadow: 4px 4px 0 var(--ink);
  transition: all 0.15s ease;
  text-decoration: none;
  display: inline-block;
}

.btn:hover {
  transform: translate(-2px, -2px);
  box-shadow: 6px 6px 0 var(--ink);
}

.btn:active {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0 var(--ink);
}

.btn.submit { background: var(--pink); color: white; }
.btn.cancel { background: white; }

.feedback {
  font-family: 'Bungee', sans-serif;
  font-size: 1.5rem;
  margin: 14px 0;
  min-height: 30px;
}
.feedback.right { color: var(--sky-dark); }
.feedback.wrong { color: var(--pink-deep); }

.steal-banner {
  background: var(--gold);
  border: 3px solid var(--ink);
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 14px;
  font-family: 'Bungee', sans-serif;
  font-size: 1rem;
  color: var(--ink);
}

.winner-trophy {
  font-size: 6rem;
  margin: 10px 0;
  display: inline-block;
  animation: trophy-bounce 1s ease infinite;
}

@keyframes trophy-bounce {
  0%, 100% { transform: rotate(-5deg) scale(1); }
  50% { transform: rotate(5deg) scale(1.1); }
}

.winner-text {
  font-family: 'Bungee', sans-serif;
  font-size: clamp(2rem, 7vw, 3.5rem);
  margin-bottom: 12px;
  text-shadow: 4px 4px 0 var(--ink);
}

.winner-text.girls { color: var(--girls); }
.winner-text.guys { color: var(--guys); }
.winner-text.tie { color: var(--ink); }

.final-scores {
  font-family: 'Bungee', sans-serif;
  font-size: 1.4rem;
  margin: 16px 0;
}

</style>
</head>
<body>
<main>

<div class="topbar">
  <a href="index.html" class="back-link">← back</a>
  <h1>Jeopardy Showdown</h1>
  <div style="width: 70px;"></div>
</div>

<div class="scoreboard">
  <div class="team girls" id="team-girls">
    <div class="team-name">GIRLS</div>
    <div class="team-score" id="score-girls">$0</div>
    <div class="team-label">~ go girls! ~</div>
  </div>
  <div class="team guys" id="team-guys">
    <div class="team-name">GUYS</div>
    <div class="team-score" id="score-guys">$0</div>
    <div class="team-label">~ go guys! ~</div>
  </div>
</div>

<div class="category-header">
  <h2>SOFTBALL SURPRISES</h2>
</div>

<div class="message" id="message">Pick a dollar amount to start!</div>

<div class="board" id="board"></div>

</main>

<div class="modal-backdrop" id="clue-modal">
  <div class="modal">
    <div class="modal-value" id="modal-value">$100</div>
    <div class="modal-team-banner" id="modal-team">~ <strong id="modal-team-name">GIRLS</strong> answering ~</div>
    <div class="steal-banner" id="steal-banner" style="display:none;">⚡ STEAL OPPORTUNITY ⚡</div>
    <div class="modal-clue" id="modal-clue">Question here</div>
    <input type="text" class="modal-input" id="answer-input" placeholder="TYPE ANSWER" maxlength="40" autocomplete="off">
    <div class="feedback" id="feedback"></div>
    <div class="modal-actions">
      <button class="btn submit" id="submit-btn">SUBMIT</button>
      <button class="btn cancel" id="skip-btn">SKIP</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="winner-modal">
  <div class="modal">
    <div class="winner-trophy">🏆</div>
    <div class="winner-text" id="winner-text">WINNER!</div>
    <div class="final-scores">
      Girls: <span id="final-girls">$0</span> · Guys: <span id="final-guys">$0</span>
    </div>
    <p id="winner-blurb">Great game!</p>
    <div class="modal-actions">
      <button class="btn submit" onclick="location.reload()">PLAY AGAIN</button>
      <a href="index.html" class="btn cancel">HOME</a>
    </div>
  </div>
</div>

<script>
const CLUES = [
  {
    value: 100,
    question: "What city was the first softball game played in?",
    answers: ["chicago"]
  },
  {
    value: 200,
    question: "Which is harder: a softball or a baseball?",
    answers: ["softball", "a softball", "the softball"]
  },
  {
    value: 300,
    question: "What's the name of the famous pitch where the pitcher's arm makes a full circle?",
    answers: ["windmill", "windmill pitch", "the windmill"]
  },
  {
    value: 400,
    question: "What was softball ORIGINALLY called when it was invented in 1887?",
    answers: ["kitten ball", "kittenball", "kitten"]
  },
  {
    value: 500,
    question: "Softball batters have LESS of this than MLB batters facing a 100 mph fastball. (Two words!)",
    answers: ["reaction time", "reactiontime"]
  }
];

let state = {
  currentTeam: 'girls',
  scores: { girls: 0, guys: 0 },
  done: new Set(),
  activeClue: null,
  isStealing: false,
  originalTeam: null,
};

const $ = (id) => document.getElementById(id);

function buildBoard() {
  const board = $('board');
  board.innerHTML = '';
  CLUES.forEach((clue, idx) => {
    const tile = document.createElement('div');
    tile.className = 'board-tile';
    tile.dataset.index = idx;
    tile.textContent = '$' + clue.value;
    if (state.done.has(idx)) {
      tile.classList.add('done');
    } else {
      tile.onclick = () => openClue(idx);
    }
    board.appendChild(tile);
  });
}

function setMessage(text, type = '') {
  $('message').textContent = text;
  $('message').className = 'message ' + type;
}

function updateScores() {
  $('score-girls').textContent = '$' + state.scores.girls;
  $('score-guys').textContent = '$' + state.scores.guys;
}

function updateActiveTeam() {
  $('team-girls').classList.toggle('active', state.currentTeam === 'girls');
  $('team-guys').classList.toggle('active', state.currentTeam === 'guys');
}

function otherTeam() {
  return state.currentTeam === 'girls' ? 'guys' : 'girls';
}

function openClue(idx) {
  state.activeClue = idx;
  state.isStealing = false;
  state.originalTeam = state.currentTeam;

  const clue = CLUES[idx];
  $('modal-value').textContent = '$' + clue.value;
  $('modal-clue').textContent = clue.question;
  $('modal-team-name').textContent = state.currentTeam.toUpperCase();
  $('modal-team').className = 'modal-team-banner ' + state.currentTeam;
  $('steal-banner').style.display = 'none';
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  $('answer-input').value = '';
  $('answer-input').disabled = false;
  $('submit-btn').textContent = 'SUBMIT';
  $('submit-btn').style.display = 'inline-block';
  $('skip-btn').textContent = 'CANCEL';
  $('skip-btn').onclick = cancelClue;

  $('clue-modal').classList.add('show');
  setTimeout(() => $('answer-input').focus(), 100);
}

function normalizeAnswer(str) {
  return str.toLowerCase().trim().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ');
}

function checkAnswer() {
  const guess = normalizeAnswer($('answer-input').value);
  if (!guess) return;

  const clue = CLUES[state.activeClue];
  const isCorrect = clue.answers.some(a => normalizeAnswer(a) === guess);

  $('answer-input').disabled = true;
  $('submit-btn').style.display = 'none';

  if (isCorrect) {
    const points = state.isStealing ? Math.floor(clue.value / 2) : clue.value;
    state.scores[state.currentTeam] += points;
    updateScores();
    $('feedback').textContent = '✓ CORRECT! +$' + points;
    $('feedback').className = 'feedback right';
    $('skip-btn').textContent = 'NEXT';
    $('skip-btn').onclick = closeClueAndContinue;
  } else {
    state.scores[state.currentTeam] -= clue.value;
    updateScores();
    $('feedback').textContent = '✗ WRONG! -$' + clue.value;
    $('feedback').className = 'feedback wrong';

    if (!state.isStealing) {
      state.isStealing = true;
      state.currentTeam = otherTeam();
      updateActiveTeam();
      setTimeout(() => {
        $('modal-team-name').textContent = state.currentTeam.toUpperCase();
        $('modal-team').className = 'modal-team-banner ' + state.currentTeam;
        $('steal-banner').style.display = 'block';
        $('steal-banner').textContent = '⚡ ' + state.currentTeam.toUpperCase() + ', STEAL FOR $' + Math.floor(clue.value / 2) + '! ⚡';
        $('feedback').textContent = '';
        $('answer-input').value = '';
        $('answer-input').disabled = false;
        $('submit-btn').style.display = 'inline-block';
        $('submit-btn').textContent = 'STEAL!';
        $('skip-btn').textContent = 'PASS';
        $('skip-btn').onclick = handleStealPass;
        $('answer-input').focus();
      }, 1400);
      return;
    } else {
      $('skip-btn').textContent = 'NEXT';
      $('skip-btn').onclick = closeClueAndContinue;
    }
  }
}

function handleStealPass() {
  $('feedback').textContent = state.currentTeam.toUpperCase() + ' passed.';
  $('feedback').className = 'feedback';
  $('answer-input').disabled = true;
  $('submit-btn').style.display = 'none';
  $('skip-btn').textContent = 'NEXT';
  $('skip-btn').onclick = closeClueAndContinue;
}

function cancelClue() {
  $('clue-modal').classList.remove('show');
  setMessage(state.currentTeam.toUpperCase() + ', pick a square!', '');
}

function closeClueAndContinue() {
  state.done.add(state.activeClue);
  $('clue-modal').classList.remove('show');

  state.currentTeam = state.originalTeam === 'girls' ? 'guys' : 'girls';
  updateActiveTeam();

  if (state.done.size >= CLUES.length) {
    endGame();
  } else {
    buildBoard();
    setMessage(state.currentTeam.toUpperCase() + ', pick a square!', '');
  }
}

$('submit-btn').onclick = checkAnswer;
$('skip-btn').onclick = cancelClue;

$('answer-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !$('answer-input').disabled) {
    checkAnswer();
  }
});

function endGame() {
  $('final-girls').textContent = '$' + state.scores.girls;
  $('final-guys').textContent = '$' + state.scores.guys;

  let winnerText, winnerClass, blurb;
  if (state.scores.girls > state.scores.guys) {
    winnerText = 'GIRLS WIN! 💖';
    winnerClass = 'girls';
    blurb = 'Girls dominated the diamond!';
  } else if (state.scores.guys > state.scores.girls) {
    winnerText = 'GUYS WIN! ⚾';
    winnerClass = 'guys';
    blurb = 'Guys took home the trophy!';
  } else {
    winnerText = "IT'S A TIE!";
    winnerClass = 'tie';
    blurb = 'Wow — perfectly even! Rematch?';
  }

  const w = $('winner-text');
  w.textContent = winnerText;
  w.className = 'winner-text ' + winnerClass;
  $('winner-blurb').textContent = blurb;
  $('winner-modal').classList.add('show');
}

buildBoard();
updateActiveTeam();
updateScores();

</script>
</body>
</html>
